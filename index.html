<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铁路历史足迹地图</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: url("images/000046.jpg") no-repeat center center fixed;
        background-size: cover; /* 拉伸至全屏 */
      }
      #china-map {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="china-map"></div>

    <!-- 引入 ECharts -->
    <script src="js/echarts.js"></script>
    <!-- 引入中国地图数据 -->
    <script src="js/china.js"></script>

    <script>
      let chart = echarts.init(document.getElementById("china-map"));

      // ----------加载 stations.json 和 trains.json----------
      Promise.all([
        fetch("json/stations.json").then((response) => response.json()),
        fetch("json/trains.json").then((response) => response.json()),
      ])
        .then(([stations, trains]) => {
          // 计算每个车站的出现次数
          let stationsCount = {};

          trains.forEach((train) => {
            const route = train.route;
            // 起点和终点加 1 次
            stationsCount[route[0]] = (stationsCount[route[0]] || 0) + 1;
            stationsCount[route[route.length - 1]] =
              (stationsCount[route[route.length - 1]] || 0) + 1;
          });

          // ----------准备车次路线的线数据----------
          let trainsData = [];
          let trainsCount = new Map();

          // 车次的线路（通过车站坐标来连接）
          trains.forEach((train) => {
            let trainData = [];

            train.route.forEach((station) => {
              // eg: train.route = ["tna", "hch", "cqx"]
              if (stations[station]) {
                trainData.push(stations[station].LatLng); // 获取车站的坐标
              }
            });

            // 确保线路数据大于 1，才绘制
            if (trainData.length > 1) {
              const start = trainData[0];
              const end = trainData[trainData.length - 1];
              // 用字符串作为 key，例如: "35.3,118.9 -> 31.2,121.5"
              const key = `${start.toString()}->${end.toString()}`;
              // 更新计数
              const count = trainsCount.get(key) || 0;
              trainsCount.set(key, count + 1);
              // curveness 为曲线弯曲度，从 0.3 开始，每重复一次加一个固定的增量
              const curveness = 0.3 + count * 0.05;

              // 绘制每条线路
              trainsData.push({
                type: "lines",
                coordinateSystem: "geo", // 使用 geo 坐标系
                smooth: true, // 平滑曲线
                data: [
                  {
                    name: train.code,
                    coords: [start, end],
                    info: {
                      code: train.code,
                      time: train.time,
                      start: stations[train.route[0]].name,
                      end: stations[train.route[train.route.length - 1]].name,
                      information: train.information,
                    },
                  },
                ],
                effect: {
                  show: true,
                  period: Math.floor(Math.random() * 5) + 4, // 动画周期
                  trailLength: 0.2, // 是否有拖尾
                  symbol: "arrow", // 箭头
                  symbolSize: 10, // 箭头大小
                },
                lineStyle: {
                  width: 3,
                  opacity: 0.9,
                  curveness: curveness,
                  color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [
                    { offset: 0, color: "#00f5ff" },
                    { offset: 1, color: "#0077ff" },
                  ]),
                },
                tooltip: {
                  show: true,
                },
              });
            }
          });

          // ----------准备车站标记的点数据----------
          let stationsData = [];
          const morandiColors = [
            "#B95756", // 柔砖红
            "#E4745E", // 珊瑚红
            "#CA774B", // 焦糖橙
            "#EC8F3F", // 杏橙
            "#A87153", // 暖棕
            "#82ABA3", // 莫兰迪青
            "#66828E", // 灰蓝
            "#586D80", // 钢蓝
            "#8E9AAB", // 雾蓝
            "#97A5C0", // 淡紫蓝
          ];

          Object.keys(stations).forEach((station) => {
            // eg:station = 'tna', stations[station] = { "LatLng": [105.88, 30.22], "name": "潼南"}

            const color =
              morandiColors[Math.floor(Math.random() * morandiColors.length)];
            if (stationsCount[station] >= 1) {
              stationsData.push({
                type: "scatter",
                coordinateSystem: "geo", // 使用 geo 坐标系
                data: [
                  {
                    name: stations[station].name,
                    value: stations[station].LatLng,
                  },
                ],
                symbol: "pin",
                symbolSize: Math.log(stationsCount[station] + 1) * 10, // 根据出现次数调整大小
                label: {
                  formatter: "{b}", // 显示车站名称
                  position: "bottom",
                  show: true,
                  fontSize: "10",
                },
                itemStyle: {
                  color: "#f13434", // 设置颜色为红色
                  borderColor: "#f13434", // 边框颜色
                  borderWidth: 2, // 边框宽度
                  shadowBlur: 10, // 阴影模糊程度
                  shadowColor: "#999", // 阴影颜色
                },
                zlevel: 1,
                emphasis: {
                  scale: 1.5, // 鼠标悬停时放大
                  itemStyle: {
                    shadowBlur: 20, // 阴影范围
                    shadowColor: "rgba(0,0,0,0.4)",
                  },
                },
              });
            }
          });

          // ----------设置 ECharts 配置----------
          // 省份颜色配置
          const provinceColors = {
            // 华北
            北京: { normal: "#BECBD3", hover: "#8E9BAE" },
            天津: { normal: "#DCDDDF", hover: "#B6BBBE" },
            河北: { normal: "#DDD0C8", hover: "#A39183" },
            山西: { normal: "#EAE0D7", hover: "#CFC3BC" },
            内蒙古: { normal: "#C6CCC0", hover: "#8A9585" },
            // 东北
            辽宁: { normal: "#CCD2CC", hover: "#737C75" },
            吉林: { normal: "#D6E1D7", hover: "#A1B0AD" },
            黑龙江: { normal: "#BFD1C4", hover: "#82ABA3" },
            // 华东
            上海: { normal: "#E3E7EA", hover: "#9DA8AF" },
            江苏: { normal: "#DBD2C9", hover: "#A39087" },
            浙江: { normal: "#E3D0CC", hover: "#AB8C83" },
            安徽: { normal: "#F4EBE4", hover: "#D2CABF" },
            福建: { normal: "#F2DBD5", hover: "#CBA29E" },
            江西: { normal: "#EBC2C0", hover: "#B87F78" },
            山东: { normal: "#D7CDD5", hover: "#A392A2" },
            // 华南
            河南: { normal: "#E0DFE4", hover: "#8D8FA4" },
            湖北: { normal: "#CFC3BC", hover: "#A08887" },
            湖南: { normal: "#E6DEDC", hover: "#C0B0A2" },
            广东: { normal: "#D6DCDB", hover: "#82898D" },
            广西: { normal: "#C1CCC7", hover: "#93A3A0" },
            海南: { normal: "#E6F1ED", hover: "#A8B2AA" },
            // 西南
            重庆: { normal: "#D4C3AA", hover: "#A39183" },
            四川: { normal: "#EDDFC4", hover: "#B5AF5A" },
            贵州: { normal: "#D1D3C5", hover: "#737C75" },
            云南: { normal: "#DEE1CB", hover: "#93A3A0" },
            西藏: { normal: "#EEF1EA", hover: "#ADB5AB" },
            // 西北
            陕西: { normal: "#C5BDB2", hover: "#908982" },
            甘肃: { normal: "#D2CABF", hover: "#A09952" },
            青海: { normal: "#EEDAC0", hover: "#BFBC9D" },
            宁夏: { normal: "#D6D9B9", hover: "#C0C182" },
            新疆: { normal: "#F3F4D5", hover: "#CDDAA5" },
            // 港澳台
            香港: { normal: "#E8D8D7", hover: "#B87F78" },
            澳门: { normal: "#F9ECE4", hover: "#CBA29E" },
            台湾: { normal: "#E0DFE4", hover: "#8D8FA4" },
          };

          const option = {
            backgroundColor: "transparent", // 透明背景

            geo: {
              map: "china",
              roam: true,
              zoom: 1.2,
              scaleLimit: {
                min: 1, // 最小缩放倍数（不能再缩小）
                max: 100, // 最大缩放倍数（不能无限放大）
              },

              regions: Object.keys(provinceColors).map((name) => ({
                name,
                itemStyle: {
                  areaColor: provinceColors[name].normal,
                  opacity: 0.8,
                },
                emphasis: {
                  itemStyle: {
                    areaColor: provinceColors[name].normal,
                    opacity: 1,
                    shadowBlur: 15, // 阴影范围
                    shadowColor: "rgba(0,0,0,0.6)", // 黑色阴影
                    borderColor: "rgba(0,0,0,0.6)", // 黑色描边
                    borderWidth: 1.5,
                  },
                },
              })),
              tooltip: {
                show: false,
              },
            },
            tooltip: {
              trigger: "item",
              formatter: function (params) {
                // 只对线路生效
                if (params.seriesType === "lines") {
                  const info = params.data.info;
                  return `
                    车次：${info.code}<br/>
                    时间：${info.time}<br/>
                    起点：${info.start}<br/>
                    终点：${info.end}<br/>
                    ${info.information ? `记录：${info.information}` : ""}
                  `;
                }
                return params.name;
              },
            },

            series: [
              ...trainsData, // 车次曲线
              ...stationsData, // 车站点（保持你已有的设置）
            ],
          };

          // 6. 使用配置项填充图表
          chart.setOption(option);
        })
        .catch((error) => {
          console.error("加载数据失败:", error);
        });
    </script>
  </body>
</html>
