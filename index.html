<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铁路历史足迹地图</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: url("images/000046.jpg") no-repeat center center fixed;
        background-size: cover; /* 拉伸至全屏 */
      }
      #china-map {
        width: 100%;
        height: 100vh;
      }
    </style>
    <link rel="stylesheet" href="css/control-panel.css" />
  </head>
  <body>
    <div id="china-map"></div>

    <!-- 引入 ECharts -->
    <script src="js/echarts.js"></script>
    <!-- 引入中国地图数据 -->
    <script src="js/china.js"></script>
    <!-- 引入自定义工具脚本 -->
    <script src="js/utils.js"></script>

    <div id="layer-control">
      <button id="btn-all">全部路线</button>
      <button id="btn-train">仅铁路</button>
      <button id="btn-flight">仅航空</button>
    </div>

    <script>
      let chart = echarts.init(document.getElementById("china-map"));

      // ----------加载 stations.json 和 trains.json----------
      Promise.all([
        fetch("json/stations.json").then((response) => response.json()),
        fetch("json/trains.json").then((response) => response.json()),
        fetch("json/flights.json").then((response) => response.json()),
        fetch("json/airports.json").then((response) => response.json()),
      ])
        .then(([stations, trains, flights, airports]) => {
          // 计算每个车站、机场的出现次数
          let stationsCount = {};
          let airportsCount = {};

          trains.forEach((train) => {
            const route = train.route;
            // 起点和终点加 1 次
            stationsCount[route[0]] = (stationsCount[route[0]] || 0) + 1;
            stationsCount[route[route.length - 1]] =
              (stationsCount[route[route.length - 1]] || 0) + 1;
          });

          flights.forEach((flight) => {
            const route = flight.route;
            // 起点和终点加 1 次
            airportsCount[route[0]] = (airportsCount[route[0]] || 0) + 1;
            airportsCount[route[route.length - 1]] =
              (airportsCount[route[route.length - 1]] || 0) + 1;
          });

          // ----------准备车次路线的线数据----------
          let trainsData = [];
          let trainsCount = new Map();

          // 火车的线路（通过车站坐标来连接）
          trains.forEach((train) => {
            let trainData = [];

            train.route.forEach((station) => {
              // eg: train.route = ["tna", "hch", "cqx"]
              if (stations[station]) {
                trainData.push(stations[station].LatLng); // 获取车站的坐标
              }
            });

            // 确保线路数据大于 1，才绘制
            if (trainData.length > 1) {
              const start = trainData[0];
              const end = trainData[trainData.length - 1];
              // 用字符串作为 key，例如: "35.3,118.9 -> 31.2,121.5"
              const key = `${start.toString()}->${end.toString()}`;
              // 更新计数
              const count = trainsCount.get(key) || 0;
              trainsCount.set(key, count + 1);
              // curveness 为曲线弯曲度，从 0.3 开始，每重复一次加一个固定的增量
              const curveness = 0.3 + count * 0.05;

              // 绘制每条线路
              trainsData.push({
                type: "lines",
                coordinateSystem: "geo", // 使用 geo 坐标系
                smooth: true, // 平滑曲线
                data: [
                  {
                    name: train.code,
                    coords: [start, end],
                    info: {
                      code: train.code,
                      time: train.time,
                      start: stations[train.route[0]].name,
                      end: stations[train.route[train.route.length - 1]].name,
                      information: train.information,
                    },
                  },
                ],
                effect: {
                  show: true,
                  period: Math.floor(Math.random() * 5) + 4, // 动画周期
                  // trailLength: 0.2, // 是否有拖尾
                  symbol: getTrainSymbol(train.code, start, end),
                  symbolSize: 48, // 大小
                },
                lineStyle: {
                  width: 3,
                  opacity: 0.9,
                  curveness: curveness,
                  color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [
                    { offset: 0, color: "#00f5ff" },
                    { offset: 1, color: "#0077ff" },
                  ]),
                },
                tooltip: {
                  show: true,
                },
              });
            }
          });

          // 飞机的线路（通过车站坐标来连接）
          let flightsData = [];
          let flightsCount = new Map();

          flights.forEach((flight) => {
            let flightData = [];
            flight.route.forEach((airport) => {
              // eg: flight.route = ["cqjb", "szba"]
              if (airports[airport]) {
                flightData.push(airports[airport].LatLng); // 获取机场的坐标
              }
            });

            // 确保线路数据大于 1，才绘制
            if (flightData.length > 1) {
              const start = flightData[0];
              const end = flightData[flightData.length - 1];
              // 用字符串作为 key，例如: "35.3,118.9 -> 31.2,121.5"
              const key = `${start.toString()}->${end.toString()}`;
              // 更新计数
              const count = flightsCount.get(key) || 0;
              flightsCount.set(key, count + 1);
              // curveness 为曲线弯曲度，从 0.3 开始，每重复一次加一个固定的增量
              const curveness = 0.3 + count * 0.05;

              // 绘制每条线路
              flightsData.push({
                type: "lines",
                coordinateSystem: "geo", // 使用 geo 坐标系
                smooth: true, // 平滑曲线
                data: [
                  {
                    name: flight.code,
                    coords: [start, end],
                    info: {
                      code: flight.code,
                      time: flight.time,
                      start: airports[flight.route[0]].name,
                      end: airports[flight.route[flight.route.length - 1]].name,
                      information: flight.information,
                    },
                  },
                ],
                effect: {
                  show: true,
                  period: Math.floor(Math.random() * 5) + 4, // 动画周期
                  // trailLength: 0.2, // 是否有拖尾
                  symbol: getFlightSymbol(flight.code, start, end),
                  symbolSize: 48, // 大小
                },
                lineStyle: {
                  width: 3,
                  opacity: 0.9,
                  curveness: curveness,
                  color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [
                    { offset: 0, color: "#00f5ff" },
                    { offset: 1, color: "#0077ff" },
                  ]),
                },
                tooltip: {
                  show: true,
                },
              });
            }
          });

          // ----------准备车站标记的点数据----------
          let stationsData = [];

          Object.keys(stations).forEach((station) => {
            // eg:station = 'tna', stations[station] = { "LatLng": [105.88, 30.22], "name": "潼南"}

            if (stationsCount[station] >= 1) {
              stationsData.push({
                type: "scatter",
                coordinateSystem: "geo", // 使用 geo 坐标系
                data: [
                  {
                    name: stations[station].name,
                    value: stations[station].LatLng,
                  },
                ],
                symbol: "image://./images/火车站.png",
                symbolSize: Math.log(stationsCount[station] + 1) * 10, // 根据出现次数调整大小
                label: {
                  formatter: "{b}", // 显示车站名称
                  position: "bottom",
                  show: true,
                  fontSize: "10",
                },
                itemStyle: {
                  color: "#f13434", // 设置颜色为红色
                  borderColor: "#f13434", // 边框颜色
                  borderWidth: 2, // 边框宽度
                  shadowBlur: 10, // 阴影模糊程度
                  shadowColor: "#999", // 阴影颜色
                },
                zlevel: 1,
                emphasis: {
                  scale: 1.5, // 鼠标悬停时放大
                  itemStyle: {
                    shadowBlur: 20, // 阴影范围
                    shadowColor: "rgba(0,0,0,0.4)",
                  },
                },
              });
            }
          });

          // ----------准备机场标记的点数据----------
          let airportsData = [];

          Object.keys(airports).forEach((airport) => {
            // eg:airport = 'cqjb', airports[airport] = { "LatLng": [106.66, 29.72], "name": "重庆江北"}
            if (airportsCount[airport] >= 1) {
              airportsData.push({
                type: "scatter",
                coordinateSystem: "geo", // 使用 geo 坐标系
                data: [
                  {
                    name: airports[airport].name,
                    value: airports[airport].LatLng,
                  },
                ],
                symbol: "image://./images/飞机场.png",
                symbolSize: Math.log(airportsCount[airport] + 1) * 10, // 根据出现次数调整大小
                label: {
                  formatter: "{b}", // 显示车站名称
                  position: "bottom",
                  show: true,
                  fontSize: "10",
                },
                itemStyle: {
                  color: "#f13434", // 设置颜色为红色
                  borderColor: "#f13434", // 边框颜色
                  borderWidth: 2, // 边框宽度
                  shadowBlur: 10, // 阴影模糊程度
                  shadowColor: "#999", // 阴影颜色
                },
                zlevel: 1,
                emphasis: {
                  scale: 1.5, // 鼠标悬停时放大
                  itemStyle: {
                    shadowBlur: 20, // 阴影范围
                    shadowColor: "rgba(0,0,0,0.4)",
                  },
                },
              });
            }
          });

          // ----------设置 ECharts 配置----------
          const option = {
            backgroundColor: "transparent", // 透明背景

            geo: {
              map: "china",
              roam: true,
              zoom: 1.2,
              scaleLimit: {
                min: 1, // 最小缩放倍数（不能再缩小）
                max: 100, // 最大缩放倍数（不能无限放大）
              },

              regions: Object.keys(provinceColors).map((name) => ({
                name,
                itemStyle: {
                  areaColor: provinceColors[name].normal,
                  opacity: 0.8,
                },
                emphasis: {
                  itemStyle: {
                    areaColor: provinceColors[name].normal,
                    opacity: 1,
                    shadowBlur: 15, // 阴影范围
                    shadowColor: "rgba(0,0,0,0.6)", // 黑色阴影
                    borderColor: "rgba(0,0,0,0.6)", // 黑色描边
                    borderWidth: 1.5,
                  },
                },
              })),
              tooltip: {
                show: false,
              },
            },
            tooltip: {
              trigger: "item",
              formatter: function (params) {
                // 只对线路生效
                if (params.seriesType === "lines") {
                  const info = params.data.info;
                  return `
                    班次：${info.code}<br/>
                    时间：${info.time}<br/>
                    起点：${info.start}<br/>
                    终点：${info.end}<br/>
                    ${info.information ? `记录：${info.information}` : ""}
                  `;
                }
                return params.name;
              },
            },

            series: [
              ...trainsData, // 火车车次曲线
              ...stationsData, // 车站点（保持你已有的设置）
              ...flightsData, // 飞机航班曲线
              ...airportsData, // 机场点（保持你已有的设置）
            ],
          };

          // 6. 使用配置项填充图表
          chart.setOption(option);
          document.getElementById("btn-all").onclick = () => {
            updateSeries(
              "all",
              trainsData,
              stationsData,
              flightsData,
              airportsData
            );
          };
          document.getElementById("btn-train").onclick = () => {
            updateSeries(
              "train",
              trainsData,
              stationsData,
              flightsData,
              airportsData
            );
          };
          document.getElementById("btn-flight").onclick = () => {
            updateSeries(
              "flight",
              trainsData,
              stationsData,
              flightsData,
              airportsData
            );
          };
        })
        .catch((error) => {
          console.error("加载数据失败:", error);
        });
    </script>
  </body>
</html>
